services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [authz-net]

  kafka-init:
    image: apache/kafka:4.2.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payments.requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payments.refund.forced --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic authz.dlq.payments.requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic authz.dlq.payments.refund.forced --partitions 1 --replication-factor 1
    networks: [authz-net]

  nats:
    image: nats:2.10.29
    container_name: nats
    command: ["-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks: [authz-net]

  policy-store:
    image: postgres:16.6-alpine
    container_name: policy-store
    environment:
      - POSTGRES_DB=authz
      - POSTGRES_USER=authz
      - POSTGRES_PASSWORD=authz
    ports:
      - "5432:5432"
    volumes:
      - policy-store-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authz -d authz"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [authz-net]

  policy-server-1:
    build:
      context: ..
      dockerfile: policy-server/Dockerfile
    container_name: policy-server-1
    depends_on:
      policy-store:
        condition: service_healthy
    ports:
      - "8443:8443"
    volumes:
      - ../policies:/app/policies:ro
      - ../certs:/certs:ro
      - policy-data-1:/data
    environment:
      - POLICY_SOURCE=postgres
      - POLICY_STORE_DSN=postgres://authz:authz@policy-store:5432/authz?sslmode=disable
      - POLICY_STORE_SYNC_INTERVAL=2s
      - POLICY_FILE=/app/policies/policies.yaml
      - CERT_FILE=/certs/policy-server.pem
      - KEY_FILE=/certs/policy-server-key.pem
      - CA_FILE=/certs/ca.pem
      - ADMIN_TOKEN=dev-admin-token
      - AUDIT_FILE=/data/audit.log
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=policy-server-1
      - OTEL_EXPORTER=${OTEL_EXPORTER:-stdout}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks:
      authz-net:
        aliases:
          - policy-server

  policy-server-2:
    build:
      context: ..
      dockerfile: policy-server/Dockerfile
    container_name: policy-server-2
    depends_on:
      policy-store:
        condition: service_healthy
    ports:
      - "8444:8443"
    volumes:
      - ../policies:/app/policies:ro
      - ../certs:/certs:ro
      - policy-data-2:/data
    environment:
      - POLICY_SOURCE=postgres
      - POLICY_STORE_DSN=postgres://authz:authz@policy-store:5432/authz?sslmode=disable
      - POLICY_STORE_SYNC_INTERVAL=2s
      - POLICY_FILE=/app/policies/policies.yaml
      - CERT_FILE=/certs/policy-server.pem
      - KEY_FILE=/certs/policy-server-key.pem
      - CA_FILE=/certs/ca.pem
      - ADMIN_TOKEN=dev-admin-token
      - AUDIT_FILE=/data/audit.log
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=policy-server-2
      - OTEL_EXPORTER=${OTEL_EXPORTER:-stdout}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks: [authz-net]

  policy-server-3:
    build:
      context: ..
      dockerfile: policy-server/Dockerfile
    container_name: policy-server-3
    depends_on:
      policy-store:
        condition: service_healthy
    ports:
      - "8445:8443"
    volumes:
      - ../policies:/app/policies:ro
      - ../certs:/certs:ro
      - policy-data-3:/data
    environment:
      - POLICY_SOURCE=postgres
      - POLICY_STORE_DSN=postgres://authz:authz@policy-store:5432/authz?sslmode=disable
      - POLICY_STORE_SYNC_INTERVAL=2s
      - POLICY_FILE=/app/policies/policies.yaml
      - CERT_FILE=/certs/policy-server.pem
      - KEY_FILE=/certs/policy-server-key.pem
      - CA_FILE=/certs/ca.pem
      - ADMIN_TOKEN=dev-admin-token
      - AUDIT_FILE=/data/audit.log
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=policy-server-3
      - OTEL_EXPORTER=${OTEL_EXPORTER:-stdout}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    networks: [authz-net]

  payments:
    build:
      context: ..
      dockerfile: services/payments/Dockerfile
    container_name: payments
    depends_on:
      policy-server-1:
        condition: service_started
      policy-server-2:
        condition: service_started
      policy-server-3:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    ports:
      - "50051:50051"
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ../certs:/certs:ro
    environment:
      - SERVICE_NAME=payments
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=payments
      - OTEL_EXPORTER=${OTEL_EXPORTER:-stdout}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - POLICY_URL=https://policy-server-1:8443
      - POLICY_URLS=https://policy-server-1:8443,https://policy-server-2:8443,https://policy-server-3:8443
      - CERT_FILE=/certs/payments.pem
      - KEY_FILE=/certs/payments-key.pem
      - CA_FILE=/certs/ca.pem
      - POLICY_CERT_FILE=/certs/payments.pem
      - POLICY_KEY_FILE=/certs/payments-key.pem
      - POLICY_CA_FILE=/certs/ca.pem
      - AUTHZ_MESSAGE_SIGNING_MODE=required
      - AUTHZ_MESSAGE_SIGNING_SECRET=base64:cGF5bWVudHMtbWVzc2FnZS1zaWduaW5nLXNlY3JldA==
      - AUTHZ_MESSAGE_VERIFICATION_SECRETS=orders=base64:b3JkZXJzLW1lc3NhZ2Utc2lnbmluZy1zZWNyZXQ=,payments=base64:cGF5bWVudHMtbWVzc2FnZS1zaWduaW5nLXNlY3JldA==
      - AUTHZ_MESSAGE_MAX_AGE=5m
      - AUTHZ_MESSAGE_FUTURE_SKEW=30s
      - BROKER_DLQ_ENABLED=true
      - BROKER_DLQ_PREFIX=authz.dlq
      - BROKER_MAX_RETRIES=3
      - BROKER_RETRY_BACKOFF=500ms
      - BROKER_DEAD_LETTER_ON_DENY=true
      - BROKER_DEAD_LETTER_ON_SIGNATURE_ERROR=true
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_PAYMENT_REQUESTED=payments.requested
      - KAFKA_GROUP_ID=payments-demo
      - NATS_URL=nats://nats:4222
      - NATS_SUBJECT_PAYMENT_REQUESTED=payments.requested
    networks: [authz-net]

  orders:
    build:
      context: ..
      dockerfile: services/orders/Dockerfile
    container_name: orders
    depends_on:
      payments:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      nats:
        condition: service_started
    volumes:
      - ../certs:/certs:ro
    environment:
      - SERVICE_NAME=orders
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=orders
      - OTEL_EXPORTER=${OTEL_EXPORTER:-stdout}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - CERT_FILE=/certs/orders.pem
      - KEY_FILE=/certs/orders-key.pem
      - CA_FILE=/certs/ca.pem
      - PAYMENTS_REST_URL=https://payments:8080
      - POLICY_URL=https://policy-server-1:8443
      - POLICY_URLS=https://policy-server-1:8443,https://policy-server-2:8443,https://policy-server-3:8443
      - POLICY_CERT_FILE=/certs/orders.pem
      - POLICY_KEY_FILE=/certs/orders-key.pem
      - POLICY_CA_FILE=/certs/ca.pem
      - AUTHZ_MESSAGE_SIGNING_MODE=required
      - AUTHZ_MESSAGE_SIGNING_SECRET=base64:b3JkZXJzLW1lc3NhZ2Utc2lnbmluZy1zZWNyZXQ=
      - AUTHZ_MESSAGE_VERIFICATION_SECRETS=orders=base64:b3JkZXJzLW1lc3NhZ2Utc2lnbmluZy1zZWNyZXQ=,payments=base64:cGF5bWVudHMtbWVzc2FnZS1zaWduaW5nLXNlY3JldA==
      - AUTHZ_MESSAGE_MAX_AGE=5m
      - AUTHZ_MESSAGE_FUTURE_SKEW=30s
      - BROKER_DLQ_ENABLED=true
      - BROKER_DLQ_PREFIX=authz.dlq
      - BROKER_MAX_RETRIES=3
      - BROKER_RETRY_BACKOFF=500ms
      - BROKER_DEAD_LETTER_ON_DENY=true
      - BROKER_DEAD_LETTER_ON_SIGNATURE_ERROR=true
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TARGET_SERVICE=payments
      - KAFKA_TOPIC_PAYMENT_REQUESTED=payments.requested
      - NATS_URL=nats://nats:4222
      - NATS_TARGET_SERVICE=payments
      - NATS_SUBJECT_PAYMENT_REQUESTED=payments.requested
    networks: [authz-net]

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    user: "0:0"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../certs:/etc/prometheus/certs:ro
    ports:
      - "9091:9090"
    depends_on: [policy-server-1, policy-server-2, policy-server-3, payments]
    networks: [authz-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [authz-net]

networks:
  authz-net:
    driver: bridge

volumes:
  policy-store-data:
  policy-data-1:
  policy-data-2:
  policy-data-3:
