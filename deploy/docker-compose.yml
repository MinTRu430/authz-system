version: "3.9"

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [authz-net]

  policy-server:
    build:
      context: ..
      dockerfile: policy-server/Dockerfile
    container_name: policy-server
    ports:
      - "8443:8443"
    volumes:
      - ../policies/policies.yaml:/app/policies.yaml:ro
      - ../certs:/certs:ro
      - ../policy-data:/data
    environment:
      - POLICY_FILE=/app/policies.yaml
      - CERT_FILE=/certs/policy-server.pem
      - KEY_FILE=/certs/policy-server-key.pem
      - CA_FILE=/certs/ca.pem
      - ADMIN_TOKEN=dev-admin-token
      - AUDIT_FILE=/data/audit.log
    networks: [authz-net]

  payments:
    build:
      context: ..
      dockerfile: services/payments/Dockerfile
    container_name: payments
    depends_on:
      policy-server:
        condition: service_started
      kafka:
        condition: service_healthy
    ports:
      - "50051:50051"
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ../certs:/certs:ro
    environment:
      - SERVICE_NAME=payments
      - POLICY_URL=https://policy-server:8443
      - CERT_FILE=/certs/payments.pem
      - KEY_FILE=/certs/payments-key.pem
      - CA_FILE=/certs/ca.pem
      - POLICY_CERT_FILE=/certs/payments.pem
      - POLICY_KEY_FILE=/certs/payments-key.pem
      - POLICY_CA_FILE=/certs/ca.pem
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_PAYMENT_REQUESTED=payments.requested
      - KAFKA_GROUP_ID=payments-demo
    networks: [authz-net]

  orders:
    build:
      context: ..
      dockerfile: services/orders/Dockerfile
    container_name: orders
    depends_on:
      payments:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ../certs:/certs:ro
    environment:
      - SERVICE_NAME=orders
      - CERT_FILE=/certs/orders.pem
      - KEY_FILE=/certs/orders-key.pem
      - CA_FILE=/certs/ca.pem
      - PAYMENTS_REST_URL=https://payments:8080
      - POLICY_URL=https://policy-server:8443
      - POLICY_CERT_FILE=/certs/orders.pem
      - POLICY_KEY_FILE=/certs/orders-key.pem
      - POLICY_CA_FILE=/certs/ca.pem
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TARGET_SERVICE=payments
      - KAFKA_TOPIC_PAYMENT_REQUESTED=payments.requested
    networks: [authz-net]

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on: [policy-server, payments]
    networks: [authz-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus]
    networks: [authz-net]

networks:
  authz-net:
    driver: bridge
